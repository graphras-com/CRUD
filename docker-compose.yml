services:
  app:
    build:
      context: .
      args:
        VITE_CLIENT_ID: ""
        VITE_TENANT_ID: ""
        VITE_API_SCOPE: ""
    ports:
      - "5173:8000"
    volumes:
      - app-data:/data
    env_file: .env
    environment:
      - DATABASE_PATH=/data/app.db
    restart: unless-stopped

volumes:
  app-data:
